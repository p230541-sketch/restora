# Production overrides. Apply on top of the base file:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Requires a populated .env (see .env.production.example). With NODE_ENV=production
# the API fails closed if JWT_SECRET or the DB password are left at dev defaults.
#
# NOTE: for a real AWS deployment you would NOT run the `localstack`/`bootstrap`
# services — provision S3/SQS/Secrets/SES in AWS and leave AWS_ENDPOINT_URL empty.
# See infra/terraform/ for the managed-AWS provisioning.

services:
  source-db:
    restart: always
    deploy:
      resources:
        limits: { memory: 1G }

  ephemeral-db:
    restart: always
    deploy:
      resources:
        limits: { memory: 512M }

  telemetry-db:
    restart: always
    deploy:
      resources:
        limits: { memory: 512M }

  edge-node:
    restart: always
    deploy:
      resources:
        limits: { cpus: "0.50", memory: 256M }

  validator:
    restart: always
    deploy:
      resources:
        limits: { cpus: "1.00", memory: 512M }

  api:
    restart: always
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits: { cpus: "0.50", memory: 256M }

  control-panel:
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 5
